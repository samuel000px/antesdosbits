<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Antes dos Bits</title>
    <style>
        /* Importando uma fonte moderna e limpa similar à da imagem */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #E6DBC9; /* O tom de bege de fundo da imagem */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #2E251B; /* Marrom escuro para os textos */
        }

        .register-container {
            display: flex;
            width: 850px;
            height: 580px; /* Um pouco mais alto para acomodar os novos campos */
            background-color: #F7F2E8; /* O bege mais claro dos cards */
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }

        /* Lado Esquerdo - Painel de Boas-Vindas */
        .sidebar {
            width: 40%;
            background-color: #DBCFBA; /* Tom intermediário da divisão lateral */
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar h1 {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
            color: #2E251B;
        }

        .sidebar p {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #5C4D3C;
            margin-top: 15px;
        }

        .sidebar .footer-text {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* Lado Direito - Formulário de Cadastro */
        .form-container {
            width: 60%;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-container h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        /* Grid simples para organizar os campos sem quebrar o layout */
        .form-grid {
            display: block;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #5C4D3C;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E6DBC9;
            background-color: transparent;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2E251B;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #8C6A46;
            background-color: #FFFFFF;
        }

        /* Termos de uso */
        .terms-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #5C4D3C;
            cursor: pointer;
        }

        .terms-container input {
            accent-color: #8C6A46;
        }

        .terms-container a {
            color: #8C6A46;
            text-decoration: none;
            font-weight: 600;
        }

        .terms-container a:hover {
            text-decoration: underline;
        }

        /* Botão principal (Cadastrar) */
        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #8C6A46; /* Marrom médio sofisticado */
            color: #FFF;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 15px;
        }

        .btn-register:hover {
            background-color: #735537;
        }

        /* Link para voltar ao Login */
        .login-prompt {
            text-align: center;
            font-size: 0.9rem;
            color: #5C4D3C;
        }

        .btn-login-page {
            color: #8C6A46;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: color 0.2s ease;
        }

        .btn-login-page:hover {
            color: #2E251B;
            text-decoration: underline;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .register-container {
                flex-direction: column;
                width: 90%;
                height: auto;
                margin: 20px 0;
            }
            .sidebar {
                width: 100%;
                height: 150px;
                justify-content: center;
                padding: 30px;
            }
            .sidebar .footer-text {
                display: none;
            }
            .form-container {
                width: 100%;
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="sidebar">
            <div>
                <h1>Antes dos<br>Bits</h1>
                <p>Crie a sua conta para começar a explorar os bastidores da evolução digital.</p>
            </div>
            <div class="footer-text">
                História da Computação © 2026
            </div>
        </div>

        <div class="form-container">
            <h2>Criar Conta</h2>
            
            <form id="formCadastro">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="name" placeholder="Seu nome" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="No mínimo 6 caracteres" required>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Confirmar Senha</label>
                        <input type="password" id="confirm-password" placeholder="Repita a senha" required>
                    </div>
                </div>

                <label class="terms-container">
                    <input type="checkbox" required>
                    <span>Eu aceito os <a href="#">Termos de Uso</a> e <a href="#">Privacidade</a></span>
                </label>

                <button type="submit" class="btn-register">Criar minha conta</button>

                <div class="login-prompt">
                    Já tem uma conta? <a href="login.html" class="btn-login-page">Faça login</a>
                </div>
            </form>
        </div>
    </div>
        <script>console.log("CADASTRO JS CARREGOU");</script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
        <script src="db.js"></script>
        <script src="cadastro.js"></script>
        

</body>
</html>
