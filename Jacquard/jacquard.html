<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tear de Jacquard</title>
    <link rel="stylesheet" href="style_jacquard.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body class="theme-jacquard">
    <h1>Tear de Jacquard</h1>

    <p class="subtitle">
        Perfure o cartão e observe como o tear interpreta as instruções.
    </p>

    <div class="game">

        <div class="panel">
            <h2>Cartão Perfurado</h2>
            <div id="cardContainer">
                <div id="card"></div>
            </div>
            <button id="executeBtn">Executar Cartão</button>
        </div>

        <div class="panel">
            <h2>Tear</h2>
            <div id="loom">
                <div class="thread"></div>
                <div class="thread"></div>
                <div class="thread"></div>
                <div class="thread"></div>
                <div class="thread"></div>
            </div>
        </div>

        <div class="panel">
            <h2>Tecido Produzido</h2>
            <div id="fabric"></div>
        </div>

    </div>

    <div id="orderBox">
        <div id="difficultyControls" class="difficulty-controls" aria-label="Escolha a dificuldade do pedido">
            <button type="button" data-difficulty="auto">Auto</button>
            <button type="button" data-difficulty="facil">Fácil</button>
            <button type="button" data-difficulty="intermediario">Intermediário</button>
            <button type="button" data-difficulty="dificil">Difícil</button>
        </div>
        <p id="difficultyProgress" class="difficulty-progress"></p>

        <h3 id="clientName"></h3>
        <p id="orderQuality"></p>
        <p id="orderCost"></p>
        <p id="orderSize"></p>

        <div id="statsBox">
            <br>
            <h3>Seu Tecido</h3>
            <p id="qualityValue">Qualidade: 0</p>
            <p id="costValue">Custo: 0</p>
            <p id="sizeValue">Tamanho: 0 / 100</p>
            <p id="densityValue">Densidade do fio: 0%</p>
            <p id="regularityValue">Regularidade: 0</p>
            <p id="patternValue">Definição do desenho: 0</p>
            <p id="materialValue">Uso de material: 0</p>
        </div>
    </div>

    <button id="finishBtn">Finalizar Pedido</button>
    <button id="restartBtn">🔄 Recomeçar Jogo</button>

    <div id="resultBox"></div>

    <div id="topBar">
        <div id="coinsDisplay">💰 0 moedas</div>
    </div>

    <!-- SDK correto do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../db.js"></script>
    <script src="jacquard.js"></script>
</body>
</html>
