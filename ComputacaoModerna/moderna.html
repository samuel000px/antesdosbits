<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computação Moderna - Guerra de Protocolos</title>
    <link rel="stylesheet" href="moderna.css">
</head>
<body>
    <header class="topbar">
        <a href="../index.html">Antes dos Bits</a>
        <div id="coinsDisplay">0 moedas</div>
    </header>

    <main class="arena">
        <section class="control-panel">
            <div>
                <p class="eyebrow">Computação moderna</p>
                <h1>Guerra de Protocolos</h1>
            </div>

            <div class="setup-grid" id="setupPanel">
                <label>
                    Nome
                    <input id="playerName" maxlength="18" placeholder="Jogador">
                </label>

                <button type="button" id="createRoomBtn">Criar sala online</button>

                <label>
                    Código da sala
                    <input id="roomCodeInput" maxlength="6" placeholder="ABC123">
                </label>

                <button type="button" id="joinRoomBtn">Entrar na sala</button>

                <label>
                    Rodadas
                    <select id="roundLimit">
                        <option value="4">4</option>
                        <option value="5" selected>5</option>
                        <option value="6">6</option>
                    </select>
                </label>

                <label>
                    IAs na sala
                    <select id="aiCount">
                        <option value="0">0</option>
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                    </select>
                </label>

                <button type="button" id="startBtn" disabled>Iniciar partida</button>
            </div>

            <div class="match-status">
                <div>
                    <span>Sala</span>
                    <strong id="roomDisplay">Sem sala</strong>
                </div>
                <div>
                    <span>Rodada</span>
                    <strong id="roundDisplay">0 / 5</strong>
                </div>
                <div>
                    <span>Estado</span>
                    <strong id="turnDisplay">Entre em uma sala</strong>
                </div>
                <div>
                    <span>Prêmio</span>
                    <strong id="prizeDisplay">0 moedas</strong>
                </div>
            </div>
        </section>

        <section class="scoreboard" id="scoreboard"></section>

        <section class="game-board">
            <div class="card-lab">
                <div class="section-head">
                    <h2>Sua mão</h2>
                    <div id="energyDisplay">Energia: 0</div>
                </div>
                <div class="cards" id="cardChoices"></div>
            </div>

            <aside class="machine-panel">
                <h2>Rede da Partida</h2>
                <div class="terminal" id="roundLog">Crie ou entre em uma sala para começar.</div>
                <button type="button" id="nextRoundBtn" disabled>Próxima rodada</button>
            </aside>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="../db.js"></script>
    <script src="moderna.js"></script>
</body>
</html>
